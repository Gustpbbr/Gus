<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050514">
<title>NeuroGus · memória viva</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap');

:root {
  --c-identidade:  #00f5ff;
  --c-decisao:     #c084fc;
  --c-episodico:   #fbbf24;
  --c-procedural:  #34d399;
  --c-meta:        #f9a8d4;
  --c-biografico:  #818cf8;
  --c-preferencia: #fb923c;
  --c-rotina:      #86efac;

  --bg-deep:    #050514;
  --panel:      rgba(8, 8, 28, 0.82);
  --panel-edge: rgba(255, 255, 255, 0.06);
  --glass:      rgba(255, 255, 255, 0.025);
  --hairline:   rgba(255, 255, 255, 0.08);

  --text:       rgba(255, 255, 255, 0.92);
  --text-soft:  rgba(255, 255, 255, 0.62);
  --text-mute:  rgba(255, 255, 255, 0.36);
  --text-faint: rgba(255, 255, 255, 0.18);

  --danger:     #f87171;

  --fs-eyebrow: 10px;
  --fs-micro:   11px;
  --fs-small:   12px;
  --fs-body:    14px;
  --fs-stat:    28px;
  --fs-display: 32px;

  --s-1: 4px;  --s-2: 8px;  --s-3: 12px;  --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px;  --s-10: 40px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--fs-body);
  line-height: 1.5;
  font-feature-settings: 'ss01', 'cv02', 'cv11';
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(0, 245, 255, 0.04), transparent 60%),
    radial-gradient(ellipse 70% 50% at 70% 80%, rgba(192, 132, 252, 0.035), transparent 60%);
  pointer-events: none; z-index: 1;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none; z-index: 1;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

#graph { position: fixed; inset: 0; z-index: 2; }

/* ─── Header ─── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: var(--s-6) var(--s-8);
  background: linear-gradient(to bottom, rgba(5,5,20,0.85) 0%, transparent 100%);
  pointer-events: none;
}

.brand { display: flex; flex-direction: column; gap: 2px; }
.brand__name {
  font-family: 'Instrument Serif', serif;
  font-size: var(--fs-display); font-weight: 400; font-style: italic;
  letter-spacing: -0.02em; line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--c-identidade) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.brand__sub {
  display: flex; align-items: center; gap: var(--s-2);
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute); margin-top: var(--s-1);
}
.brand__pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-identidade);
  box-shadow: 0 0 8px var(--c-identidade);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.85); }
  50%      { opacity: 1;   transform: scale(1.15); }
}

.stats { display: flex; gap: var(--s-8); pointer-events: auto; }
.stat { display: flex; flex-direction: column; align-items: flex-end; }
.stat__value {
  font-family: 'Instrument Serif', serif;
  font-size: var(--fs-stat); font-weight: 400; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat__value--accent { color: var(--c-identidade); }
.stat__label {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute); margin-top: var(--s-1);
}

/* ─── Filtros recolhíveis ─── */
.filters {
  position: fixed; top: 96px; left: var(--s-8); z-index: 50;
  display: flex; flex-direction: column; gap: 2px;
  pointer-events: auto;
}

.filters__header {
  display: flex; align-items: center; gap: var(--s-2);
  background: var(--panel);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 8px 10px 8px 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  color: var(--text-soft);
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  width: 160px;
}

.filters__header:hover { color: var(--text); border-color: rgba(255,255,255,0.16); }

.filters__chevron {
  margin-left: auto;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  width: 10px; height: 10px;
  display: flex; align-items: center; justify-content: center;
}
.filters__chevron svg { width: 100%; height: 100%; }
.filters.is-collapsed .filters__chevron { transform: rotate(-90deg); }

.filters__active-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fff;
  transition: background 0.3s;
}

.filters__list {
  display: flex; flex-direction: column;
  gap: 2px;
  margin-top: 6px;
  max-height: 65vh;
  overflow-y: auto;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.3s ease,
              margin-top 0.3s ease;
  opacity: 1;
}

.filters.is-collapsed .filters__list {
  max-height: 0;
  opacity: 0;
  margin-top: 0;
}

.chip {
  appearance: none; background: transparent; border: 1px solid transparent;
  color: var(--text-mute); font-family: inherit;
  font-size: var(--fs-micro); letter-spacing: 0.06em;
  padding: 6px 12px 6px 8px; cursor: pointer;
  display: flex; align-items: center; gap: var(--s-2);
  border-radius: 999px;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  text-align: left;
}

.chip__dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  transition: box-shadow 0.25s ease;
}

.chip:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.chip:hover .chip__dot { box-shadow: 0 0 8px currentColor; }

.chip.is-active {
  color: var(--text);
  background: rgba(255,255,255,0.05);
  border-color: var(--hairline);
}
.chip.is-active .chip__dot { box-shadow: 0 0 10px currentColor; }

.chip--none {
  color: var(--text-faint);
  font-style: italic;
}
.chip--none .chip__dot {
  background: transparent;
  border: 1px dashed var(--text-faint);
  width: 6px; height: 6px;
}

/* ─── Controles 3D ─── */
.controls {
  position: fixed;
  bottom: var(--s-8);
  right: var(--s-8);
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  pointer-events: auto;
}

.ctrl-group {
  background: var(--panel);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ctrl-group--horizontal {
  flex-direction: row;
}

.ctrl-btn {
  appearance: none;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-soft);
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: inherit;
  position: relative;
}

.ctrl-btn:hover {
  color: var(--text);
  background: rgba(255,255,255,0.05);
}

.ctrl-btn:active {
  background: rgba(255,255,255,0.1);
  transform: scale(0.94);
}

.ctrl-btn.is-active {
  color: var(--c-identidade);
  background: rgba(0, 245, 255, 0.08);
}

.ctrl-btn svg {
  width: 16px; height: 16px;
  pointer-events: none;
}

.ctrl-btn__tooltip {
  position: absolute;
  right: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%) translateX(4px);
  background: var(--panel);
  backdrop-filter: blur(16px);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-soft);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
}

.ctrl-btn:hover .ctrl-btn__tooltip {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
}

.ctrl-btn--small {
  width: 32px;
  height: 26px;
}

.ctrl-divider {
  height: 1px;
  background: var(--hairline);
  margin: 4px 6px;
}

/* ─── Slider vertical de zoom ─── */
.ctrl-group--zoom {
  align-items: center;
  padding: 8px 6px;
  gap: 4px;
}

.zoom-slider {
  position: relative;
  width: 32px;
  height: 120px;
  margin: 4px 0;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.zoom-slider__track {
  position: absolute;
  width: 2px;
  height: 100%;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  pointer-events: none;
}

.zoom-slider__fill {
  position: absolute;
  width: 2px;
  bottom: 0;
  background: linear-gradient(to top, var(--c-identidade), rgba(0, 245, 255, 0.4));
  border-radius: 2px;
  height: 50%;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(0, 245, 255, 0.5);
  transition: height 0.15s ease;
}

.zoom-slider__thumb {
  position: absolute;
  width: 14px;
  height: 14px;
  background: var(--text);
  border: 2px solid var(--c-identidade);
  border-radius: 50%;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  box-shadow: 0 0 8px rgba(0, 245, 255, 0.6),
              0 2px 4px rgba(0, 0, 0, 0.3);
  transition: top 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
}

.zoom-slider:hover .zoom-slider__thumb {
  transform: translateY(-50%) scale(1.15);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.8),
              0 2px 6px rgba(0, 0, 0, 0.4);
}

.zoom-slider.is-dragging .zoom-slider__thumb {
  transform: translateY(-50%) scale(1.25);
  transition: transform 0.1s ease;
}

.zoom-slider.is-dragging .zoom-slider__fill,
.zoom-slider.is-dragging .zoom-slider__thumb {
  transition: none;
}

/* ─── Indicadores de borda (radar) ─── */
.edge-indicators {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 25;
}

.edge-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
  opacity: 0;
  transition: opacity 0.3s, transform 0.15s ease-out;
  transform: translate(-50%, -50%);
}

.edge-dot.is-visible { opacity: 0.7; }

/* ─── Painel lateral ─── */
.panel {
  position: fixed; top: 0; right: 0;
  width: 380px; height: 100vh;
  background: var(--panel);
  backdrop-filter: blur(32px) saturate(140%);
  -webkit-backdrop-filter: blur(32px) saturate(140%);
  border-left: 1px solid var(--panel-edge);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel.is-open { transform: translateX(0); }
.panel__glow {
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  opacity: 0.6;
}
.panel__head {
  padding: var(--s-8) var(--s-6) var(--s-5);
  border-bottom: 1px solid var(--hairline);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: var(--s-4);
}
.panel__type {
  font-size: var(--fs-eyebrow); letter-spacing: 0.22em;
  text-transform: uppercase; margin-bottom: var(--s-2);
}
.panel__content {
  font-family: 'Instrument Serif', serif;
  font-size: 18px; line-height: 1.4;
  color: var(--text); word-break: break-word;
  letter-spacing: -0.005em;
}
.panel__close {
  appearance: none; background: transparent;
  border: 1px solid var(--hairline);
  color: var(--text-mute);
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; font-family: inherit;
}
.panel__close:hover { border-color: var(--c-meta); color: var(--c-meta); background: rgba(249,168,212,0.06); }
.panel__close svg { width: 12px; height: 12px; }
.panel__body {
  flex: 1; overflow-y: auto;
  padding: var(--s-5) var(--s-6) var(--s-6);
  display: flex; flex-direction: column; gap: var(--s-2);
}
.panel__body::-webkit-scrollbar { width: 3px; }
.panel__body::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 2px; }

.meta-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: var(--glass);
  border: 1px solid var(--hairline); border-radius: 8px;
  transition: border-color 0.2s;
}
.meta-row:hover { border-color: rgba(255,255,255,0.14); }
.meta-row__key {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute);
}
.meta-row__value {
  font-size: var(--fs-small); color: var(--text);
  text-align: right; max-width: 60%; word-break: break-word;
  font-variant-numeric: tabular-nums;
}

.confidence {
  display: flex; flex-direction: column; gap: var(--s-2);
  padding: var(--s-3) var(--s-4);
  background: var(--glass); border: 1px solid var(--hairline); border-radius: 8px;
}
.confidence__row { display: flex; justify-content: space-between; align-items: center; }
.confidence__bar {
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.confidence__fill {
  height: 100%; border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 8px currentColor;
}

.section-title {
  font-size: var(--fs-eyebrow); letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-mute);
  margin: var(--s-5) 0 var(--s-3);
  padding-left: var(--s-2);
  display: flex; align-items: center; gap: var(--s-2);
}
.section-title__count { color: var(--text-faint); font-variant-numeric: tabular-nums; }

.connection {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 14px; background: var(--glass);
  border: 1px solid var(--hairline); border-radius: 8px;
  cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
}
.connection:hover { border-color: rgba(255,255,255,0.18); transform: translateX(2px); }
.connection__type {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase;
}
.connection__preview {
  font-size: var(--fs-small); color: var(--text-soft); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.panel__delete {
  margin: 0 var(--s-6) var(--s-6);
  padding: 12px;
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px; color: var(--danger);
  font-family: inherit; font-size: var(--fs-micro);
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: var(--s-2);
}
.panel__delete:hover { background: rgba(248,113,113,0.12); border-color: var(--danger); }

/* ─── Labels ─── */
.label-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 30; }

.node-label {
  position: absolute;
  transform: translate(-50%, -120%);
  pointer-events: none; opacity: 0;
  transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1),
              transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.node-label.is-visible  { opacity: 1; transform: translate(-50%, -132%); }
.node-label.is-selected { opacity: 1; transform: translate(-50%, -138%); }

.label-card {
  position: relative;
  background: rgba(8,8,28,0.88);
  border: 1px solid var(--hairline); border-radius: 10px;
  padding: 9px 13px; max-width: 220px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.label-card::after {
  content: ''; position: absolute;
  bottom: -16px; left: 50%; transform: translateX(-50%);
  width: 1px; height: 16px;
  background: linear-gradient(to bottom, currentColor, transparent);
  opacity: 0.4;
}
.label-card__type {
  font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; margin-bottom: 4px; line-height: 1;
}
.label-card__text {
  font-family: 'Instrument Serif', serif;
  font-size: 13px; color: var(--text); line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: var(--s-8); right: 110px;
  z-index: 200; max-width: 280px;
  background: var(--panel); border: 1px solid var(--hairline);
  border-radius: 12px; padding: var(--s-3) var(--s-4);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  opacity: 0; transform: translateY(16px);
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  display: flex; gap: var(--s-3); align-items: flex-start;
}
.toast.is-shown { opacity: 1; transform: translateY(0); }
.toast__indicator {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 5px; flex-shrink: 0;
  box-shadow: 0 0 10px currentColor;
}
.toast__body { flex: 1; min-width: 0; }
.toast__label {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; margin-bottom: 3px;
}
.toast__text { font-size: var(--fs-small); color: var(--text); line-height: 1.4; word-break: break-word; }

/* ─── Hint ─── */
.hint {
  position: fixed; bottom: var(--s-8); left: 50%;
  transform: translateX(-50%);
  font-size: var(--fs-eyebrow); letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-faint);
  pointer-events: none; transition: opacity 0.5s; z-index: 40;
}

/* ─── Abas de navegação ─── */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(8, 8, 28, 0.6);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  padding: 4px;
  pointer-events: auto;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.tab {
  appearance: none;
  background: transparent;
  border: none;
  color: var(--text-mute);
  font-family: inherit;
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.tab svg {
  width: 14px;
  height: 14px;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.tab:hover {
  color: var(--text-soft);
}
.tab:hover svg { opacity: 1; }

.tab.is-active {
  color: var(--text);
  background: rgba(255, 255, 255, 0.06);
}
.tab.is-active svg {
  opacity: 1;
  color: var(--c-identidade);
}

/* ─── View Lista ─── */
.list-view {
  position: fixed;
  inset: 0;
  z-index: 3;
  background: var(--bg-deep);
  display: none;
  flex-direction: column;
  padding-top: 110px;
}

.list-view.is-active {
  display: flex;
}

.list-view::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 30% 30%, rgba(0, 245, 255, 0.025), transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(192, 132, 252, 0.02), transparent 70%);
  pointer-events: none;
  z-index: -1;
}

.list-view__header {
  padding: 0 var(--s-8) var(--s-5);
  flex-shrink: 0;
}

.list-view__title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 28px;
  font-weight: 400;

const haloTextures = {};
function makeHaloTexture(color) {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0,    color + 'cc');
  grad.addColorStop(0.2,  color + '80');
  grad.addColorStop(0.5,  color + '30');
  grad.addColorStop(0.8,  color + '10');
  grad.addColorStop(1,    color + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const imgData = ctx.getImageData(0, 0, size, size);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const noise = (Math.random() - 0.5) * 18;
    d[i+3] = Math.max(0, Math.min(255, d[i+3] + noise));
  }
  ctx.putImageData(imgData, 0, 0);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

const CONTAINER_RADIUS = 100;
const SOFT_RADIUS = 75;

const chargeForce = Graph.d3Force('charge');

Graph.d3Force('shellGravity', function() {
  for (let i = 0; i < state.nodes.length; i++) {
    const n = state.nodes[i];
    if (n.x === undefined || n.x === null) continue;
    const dist = Math.sqrt(n.x*n.x + n.y*n.y + n.z*n.z);
    if (dist < 0.001) continue;

    if (dist > SOFT_RADIUS) {
      const ux = -n.x / dist;
      const uy = -n.y / dist;
      const uz = -n.z / dist;
      const overshoot = (dist - SOFT_RADIUS) / (CONTAINER_RADIUS - SOFT_RADIUS);
      const force = Math.min(overshoot * overshoot * 0.6, 2.0);
      n.vx = (n.vx || 0) + ux * force;
      n.vy = (n.vy || 0) + uy * force;
      n.vz = (n.vz || 0) + uz * force;
    }

    if (dist > CONTAINER_RADIUS) {
      const factor = CONTAINER_RADIUS / dist;
      n.x *= factor; n.y *= factor; n.z *= factor;
      if (n.vx !== undefined && n.vy !== undefined && n.vz !== undefined) {
        const dot = n.vx*n.x + n.vy*n.y + n.vz*n.z;
        if (dot > 0) {
          const f = 1.5 * dot / (CONTAINER_RADIUS * CONTAINER_RADIUS);
          n.vx -= f * n.x;
          n.vy -= f * n.y;
          n.vz -= f * n.z;
        }
      }
    }
  }
});

function getCameraDistance() {
  const cam = Graph.camera();
  return Math.sqrt(cam.position.x ** 2 + cam.position.y ** 2 + cam.position.z ** 2);
}

function rotateCamera(direction) {
  state.spinning = false;
  updateAutoRotateBtn();

  const cam = Graph.camera();
  const r = Math.sqrt(cam.position.x ** 2 + cam.position.z ** 2);
  Graph.cameraPosition({
    x: r * Math.sin(cameraAngle),
    y: cam.position.y,
    z: r * Math.cos(cameraAngle),

}

function fitAll() {
  state.spinning = false;
  updateAutoRotateBtn();
  const newDist = ZOOM_MAX;
  cameraRadius = newDist;
  cameraAngle = 0;
  Graph.cameraPosition({ x: 0, y: 0, z: newDist }, { x: 0, y: 0, z: 0 }, 700);
  updateSliderPosition(newDist);
}

function updateAutoRotateBtn() {
  $('auto-rotate').classList.toggle('is-active', state.spinning);
}

const ZOOM_MIN = 130;
const ZOOM_MAX = 700;

function clampZoom(d) {
  return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, d));
}

function distToSliderPos(dist) {
  const logMin = Math.log(ZOOM_MIN);
  const logMax = Math.log(ZOOM_MAX);
  const t = (Math.log(dist) - logMin) / (logMax - logMin);
  return Math.max(0, Math.min(1, t));
}

function sliderPosToDist(t) {
  const logMin = Math.log(ZOOM_MIN);
  const logMax = Math.log(ZOOM_MAX);
  return Math.exp(logMin + t * (logMax - logMin));
}

function setZoomDistance(newDist, animate = true) {
  newDist = clampZoom(newDist);
  const cam = Graph.camera();
  const dist = getCameraDistance() || 1;
  const scale = newDist / dist;
  Graph.cameraPosition({
    x: cam.position.x * scale,
    y: cam.position.y * scale,
    z: cam.position.z * scale,
  }, undefined, animate ? 250 : 0);
  cameraRadius = newDist;
  updateSliderPosition(newDist);
}

function setZoom(factor) {
  setZoomDistance(getCameraDistance() * factor);
}

function updateSliderPosition(dist) {
  const t = distToSliderPos(dist);
  const trackEl = $('zoom-slider');
  if (!trackEl) return;
  const h = trackEl.clientHeight;
  const thumbH = 14;
  const range = h - thumbH;
  const topPx = thumbH/2 + t * range;
  const fillPct = (1 - t) * 100;

  $('zoom-slider-thumb').style.top = topPx + 'px';
  $('zoom-slider-thumb').style.transform = 'translateY(-50%)';
  $('zoom-slider-fill').style.height = fillPct + '%';
}

$('zoom-in').addEventListener('click', () => setZoom(0.78));
$('zoom-out').addEventListener('click', () => setZoom(1.28));
$('zoom-fit').addEventListener('click', fitAll);
$('rotate-left').addEventListener('click', () => rotateCamera(-1));
$('rotate-right').addEventListener('click', () => rotateCamera(1));
$('auto-rotate').addEventListener('click', () => {
  state.spinning = !state.spinning;
  if (state.spinning) {
    const cam = Graph.camera();
    cameraAngle = Math.atan2(cam.position.x, cam.position.z);
    cameraRadius = Math.sqrt(cam.position.x ** 2 + cam.position.z ** 2) || 280;
  }

});

// ─── Zoom slider: drag/click/touch ───
const sliderEl = $('zoom-slider');
let sliderDragging = false;

function handleSliderInteraction(clientY) {
  const rect = sliderEl.getBoundingClientRect();
  const thumbH = 14;
  const range = rect.height - thumbH;
  const localY = Math.max(thumbH/2, Math.min(rect.height - thumbH/2, clientY - rect.top));
  const t = (localY - thumbH/2) / range;
  const newDist = sliderPosToDist(t);
  setZoomDistance(newDist, false);
}

sliderEl.addEventListener('mousedown', (e) => {
  sliderDragging = true;
  sliderEl.classList.add('is-dragging');
  handleSliderInteraction(e.clientY);
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!sliderDragging) return;
  handleSliderInteraction(e.clientY);
});

window.addEventListener('mouseup', () => {
  if (sliderDragging) {
    sliderDragging = false;
    sliderEl.classList.remove('is-dragging');
  }
});

sliderEl.addEventListener('touchstart', (e) => {
  sliderDragging = true;
  sliderEl.classList.add('is-dragging');
  if (e.touches.length) handleSliderInteraction(e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', (e) => {
  if (!sliderDragging) return;
  if (e.touches.length) handleSliderInteraction(e.touches[0].clientY);
}, { passive: false });

window.addEventListener('touchend', () => {
  if (sliderDragging) {
    sliderDragging = false;
    sliderEl.classList.remove('is-dragging');
  }
});

  const data = getFilteredData();

  const projected = data.nodes.map((n) => {
    const pos = n.__threeObj
      ? n.__threeObj.position.clone()
      : new THREE.Vector3(n.x || 0, n.y || 0, n.z || 0);
    const worldPos = pos.clone();
    pos.project(cam);
    const x = (pos.x * 0.5 + 0.5) * W;
    const y = (pos.y * -0.5 + 0.5) * H;
    const dx = worldPos.x - cam.position.x;
    const dy = worldPos.y - cam.position.y;
    const dz = worldPos.z - cam.position.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    const onScreen = pos.z < 1 && x > 0 && x < W && y > 0 && y < H;
    return { node: n, x, y, dist, onScreen, worldPos };
  });

  const visibleEdgeIds = new Set();
  const MARGIN = 28;
  projected.forEach((p) => {
    if (p.onScreen) return;
    visibleEdgeIds.add(p.node.id);
    const dot = getOrCreateEdgeDot(p.node.id, p.node.color);

    let dx = p.x - W / 2;
    let dy = p.y - H / 2;
    if (p.worldPos && p.worldPos.distanceTo(cam.position) > 0) {
      const cameraForward = new THREE.Vector3();
      cam.getWorldDirection(cameraForward);
      const toNode = p.worldPos.clone().sub(cam.position);
      if (toNode.dot(cameraForward) < 0) {
        dx = -dx; dy = -dy;
      }
    }
    const angle = Math.atan2(dy, dx);
    const halfW = W / 2 - MARGIN;
    const halfH = H / 2 - MARGIN;
    let edgeX, edgeY;
    const tanA = Math.tan(angle);
    if (Math.abs(halfW * tanA) <= halfH) {
      edgeX = (dx > 0 ? halfW : -halfW);
      edgeY = edgeX * tanA;
    } else {
      edgeY = (dy > 0 ? halfH : -halfH);
      edgeX = edgeY / tanA;
    }
    dot.style.left = (W / 2 + edgeX) + 'px';
    dot.style.top  = (H / 2 + edgeY) + 'px';
    dot.classList.add('is-visible');
  });
  for (const id of state.edgeDots.keys()) {
    if (!visibleEdgeIds.has(id)) {
      const d = state.edgeDots.get(id);
      d.classList.remove('is-visible');
      setTimeout(() => {
        if (!visibleEdgeIds.has(id)) removeEdgeDot(id);
      }, 350);
    }
  }

  if (!state.showLabels) {
    clearAllLabels();
    return;
  }

  const onScreenSorted = projected.filter(p => p.onScreen).sort((a, b) => a.dist - b.dist);
  const topN = new Set(onScreenSorted.slice(0, 5).map(p => p.node.id));
  const visibleSet = new Set([...topN, ...state.selectedNeighbors]);

  for (const [id, el] of state.labelEls) {
    if (!visibleSet.has(id)) {
      el.classList.remove('is-visible', 'is-selected');
      setTimeout(() => {
        if (!visibleSet.has(id) && state.labelEls.has(id)) removeLabel(id);
      }, 450);
    }
  }

  visibleSet.forEach((id) => {
    const node = state.nodeMap.get(id);
    if (!node) return;
    makeLabel(node);
    const el = state.labelEls.get(id);
    const p = projected.find(pp => pp.node.id === id);
    if (!p || !p.onScreen) {
      el.classList.remove('is-visible', 'is-selected');
      return;
    }
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    if (state.selectedNeighbors.has(id)) {
      el.classList.remove('is-visible');
      el.classList.add('is-selected');
    } else {
      el.classList.remove('is-selected');
      el.classList.add('is-visible');
    }
  });
}

Graph.onEngineTick(updateLabelsAndIndicators);

// ─── Stats ───
function updateStats() {
  $('stat-frags').textContent = state.nodes.length;
  $('stat-conns').textContent = state.links.length;
  const today = new Date().toISOString().slice(0, 10);
  $('stat-today').textContent = state.nodes.filter((n) => n.timestamp.startsWith(today)).length;
}
updateStats();

// ─── Abas: alternância Cosmos / Lista ───
state.view = 'cosmos';

const tabCosmosBtn = $('tab-cosmos');
const tabListBtn = $('tab-list');
const listViewEl = $('list-view');

function setView(view) {
  state.view = view;
  tabCosmosBtn.classList.toggle('is-active', view === 'cosmos');
  tabListBtn.classList.toggle('is-active', view === 'list');
  listViewEl.classList.toggle('is-active', view === 'list');
  document.body.classList.toggle('view-list', view === 'list');

  if (view === 'list') {
    renderList();
    state.spinning = false;
    if (typeof updateAutoRotateBtn === 'function') updateAutoRotateBtn();
  } else {
    if (!state.selectedId) {
      state.spinning = true;
      if (typeof updateAutoRotateBtn === 'function') updateAutoRotateBtn();
    }
  }
}

tabCosmosBtn.addEventListener('click', () => setView('cosmos'));
tabListBtn.addEventListener('click', () => setView('list'));

// ─── Renderização da Lista por área ───
function renderList() {
  const body = $('list-view-body');
  body.innerHTML = '';

  if (!state.nodes.length) {
    body.innerHTML = '<div class="list-empty">nenhum fragmento</div>';
    return;
  }

  const byArea = {};
  for (const n of state.nodes) {
    const area = n.area || 'sem área';
    if (!byArea[area]) byArea[area] = [];
    byArea[area].push(n);
  }

  const sortedAreas = Object.keys(byArea).sort((a, b) =>
    byArea[b].length - byArea[a].length
  );

  const connCount = new Map();
  state.links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    connCount.set(s, (connCount.get(s) || 0) + 1);
    connCount.set(t, (connCount.get(t) || 0) + 1);
  });

  for (const area of sortedAreas) {
    const items = byArea[area];

    const groupEl = document.createElement('section');
    groupEl.className = 'area-group';

    const head = document.createElement('div');
    head.className = 'area-group__head';
    head.innerHTML = `
      <span class="area-group__name">${area}</span>
      <span class="area-group__count">${items.length} ${items.length === 1 ? 'fragmento' : 'fragmentos'}</span>
    `;
    groupEl.appendChild(head);

    const itemsList = document.createElement('div');
    itemsList.className = 'area-group__items';

    items.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));

    for (const node of items) {
      const item = document.createElement('button');
      item.className = 'list-item';
      const dataFmt = node.timestamp
        ? new Date(node.timestamp).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' })
        : '—';
      const conns = connCount.get(node.id) || 0;
      item.innerHTML = `
        <span class="list-item__dot" style="background:${node.color};color:${node.color}"></span>
        <div class="list-item__body">
          <div class="list-item__top">
            <span class="list-item__type" style="color:${node.color}">${node.tipo.replace(/_/g, ' ')}</span>
            <span class="list-item__meta">${dataFmt} · ${node.curador}</span>
            ${conns ? `<span class="list-item__meta">${conns} ${conns === 1 ? 'conexão' : 'conexões'}</span>` : ''}
          </div>
          <div class="list-item__content">${node.conteudo}</div>
          <div class="list-item__conf">confiança ${(node.confianca * 100).toFixed(0)}%</div>
        </div>
      `;
      item.addEventListener('click', () => {
        setView('cosmos');
        setTimeout(() => openPanel(node), 50);
      });
      itemsList.appendChild(item);
    }

    groupEl.appendChild(itemsList);
    body.appendChild(groupEl);
  }
}

// ─── Filtros ───
const filtersEl = $('filters');
const filtersToggle = $('filters-toggle');
const filtersList = $('filters-list');

filtersToggle.addEventListener('click', () => {
  const collapsed = filtersEl.classList.toggle('is-collapsed');
  filtersToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
});

function applyFilter(f) {
  state.filter = f;
  state.showLabels = f !== 'none';

  document.querySelectorAll('.chip').forEach((b) => {
    if (b.dataset.filter === '__halo') return;
    b.classList.toggle('is-active', b.dataset.filter === f);
  });

  $('filters-label').textContent = TYPE_LABEL[f] || f;
  const dotEl = $('filters-dot');
  if (f === 'all') {
    dotEl.style.background = '#fff';
    dotEl.style.border = 'none';
  } else if (f === 'none') {
    dotEl.style.background = 'transparent';
    dotEl.style.border = '1px dashed var(--text-faint)';
  } else {
    dotEl.style.background = TYPE_COLOR[f];
    dotEl.style.border = 'none';
    dotEl.style.boxShadow = `0 0 6px ${TYPE_COLOR[f]}`;
  }

  clearAllLabels();
  state.selectedNeighbors = new Set();
  Graph.graphData(getFilteredData());

  setTimeout(() => {
    filtersEl.classList.add('is-collapsed');
    filtersToggle.setAttribute('aria-expanded', 'false');
  }, 250);
}

document.querySelectorAll('.chip').forEach((btn) => {
  btn.addEventListener('click', () => {
    if (btn.dataset.filter === '__halo') {
      state.showHalo = !state.showHalo;
      btn.classList.toggle('is-active', state.showHalo);
      Graph.graphData(getFilteredData());
      return;
    }
    applyFilter(btn.dataset.filter);
  });
});

// ─── Painel ───
function openPanel(node) {
  state.selectedId = node.id;
  state.spinning = false;
  updateAutoRotateBtn();
  const data = getFilteredData();

  const neighbors = new Set([node.id]);
  data.links.forEach((l) => {
    const { s, t } = linkExtract(l);
    if (s === node.id) neighbors.add(t);
    if (t === node.id) neighbors.add(s);
  });
  state.selectedNeighbors = neighbors;

  const c = node.color;
  $('panel-glow').style.color = c;
  $('panel-type').textContent = node.tipo.replace(/_/g, ' ');
  $('panel-type').style.color = c;
  $('panel-content').textContent = node.conteudo;

  const body = $('panel-body');
  body.innerHTML = '';

  const meta = [
    { k: 'curador',  v: node.curador },
    { k: 'área',     v: node.area },
    { k: 'camada',   v: node.camada },
    { k: 'id',       v: node.id },
    { k: 'data', v: new Date(node.timestamp).toLocaleDateString('pt-BR', {
        day: '2-digit', month: 'short', year: 'numeric',
    }) },
  ];

  meta.forEach(({ k, v }) => {
    const r = document.createElement('div');
    r.className = 'meta-row';
    r.innerHTML = `<span class="meta-row__key">${k}</span><span class="meta-row__value">${v}</span>`;
    body.appendChild(r);
  });

  const conf = document.createElement('div');
  conf.className = 'confidence';
  conf.innerHTML = `
    <div class="confidence__row">
      <span class="meta-row__key">confiança</span>
      <span class="meta-row__value" style="color:${c};font-family:'Instrument Serif',serif;font-size:18px">
        ${(node.confianca * 100).toFixed(0)}<span style="font-size:11px;opacity:0.6">%</span>
      </span>
    </div>
    <div class="confidence__bar">
      <div class="confidence__fill" style="width:${node.confianca * 100}%;background:${c};color:${c}"></div>
    </div>
  `;
  body.appendChild(conf);

  const conns = data.links.filter((l) => {
    const { s, t } = linkExtract(l);
    return s === node.id || t === node.id;
  });

  if (conns.length) {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.innerHTML = `conexões <span class="section-title__count">· ${conns.length}</span>`;
    body.appendChild(title);

    conns.forEach((l) => {
      const { s, t } = linkExtract(l);
      const otherId = s === node.id ? t : s;
      const other = state.nodeMap.get(otherId);
      if (!other) return;
      const ci = document.createElement('div');
      ci.className = 'connection';
      ci.innerHTML = `
        <span class="connection__type" style="color:${other.color}">${other.tipo.replace(/_/g, ' ')}</span>
        <span class="connection__preview">${other.conteudo}</span>
      `;
      ci.addEventListener('click', () => openPanel(other));
      body.appendChild(ci);
    });
  }

  $('panel').classList.add('is-open');
  $('hint').style.opacity = '0';
}

function closePanel() {
  $('panel').classList.remove('is-open');
  state.selectedId = null;
  state.selectedNeighbors = new Set();
  state.spinning = true;
  updateAutoRotateBtn();
  setTimeout(() => { $('hint').style.opacity = '1'; }, 600);
}

$('panel-close').addEventListener('click', closePanel);

// Atual: hard delete só client-side. Etapa 1B conecta no DELETE /hub/fragmento/{id}
// e Parte 2 troca por modal de soft+hard delete.
$('panel-delete').addEventListener('click', () => {
  if (!state.selectedId) return;
  const id = state.selectedId;
  state.nodes = state.nodes.filter((n) => n.id !== id);
  state.nodeMap.delete(id);
  state.links = state.links.filter((l) => {
    const { s, t } = linkExtract(l);
    return s !== id && t !== id;
  });
  removeLabel(id);
  state.selectedNeighbors = new Set();
  Graph.graphData(getFilteredData());
  updateStats();
  closePanel();
  showToast('fragmento removido', 'apagado', '#f87171');
});

// ─── Toast ───
function showToast(text, label, color) {
  $('toast-label').textContent = label || 'novo fragmento';
  $('toast-label').style.color = color || 'var(--c-identidade)';
  $('toast-text').textContent = text;
  $('toast-dot').style.background = color || 'var(--c-identidade)';
  $('toast-dot').style.color = color || 'var(--c-identidade)';
  const el = $('toast');
  el.classList.add('is-shown');
  setTimeout(() => el.classList.remove('is-shown'), 3800);
}

// ─── Adicionar fragmento (handler pra SSE ativado na Etapa 1B) ───
function addFragment(raw) {
  if (!raw || !raw.conteudo) return;
  const color = getNodeColor(raw);
  const node = {
    id: raw.id || ('new_' + (++state.nextId)),
    conteudo: raw.conteudo,
    tipo: raw.tipo || 'episodico',
    area: raw.area || '',
    curador: raw.curador || 'desconhecido',
    camada: raw.camada || 'sessao',
    confianca: raw.confianca || 0.7,
    timestamp: raw.criado_em || new Date().toISOString(),
    color,
    val: 0.8 + (raw.confianca || 0.7) * 0.8,
    _isNew: true,
  };
  state.nodes.push(node);
  state.nodeMap.set(node.id, node);
  const peers = state.nodes.filter((p) => p.tipo === node.tipo && p.id !== node.id);
  if (peers.length) {
    state.links.push({ source: node.id, target: peers[peers.length - 1].id });
  }
  Graph.graphData(getFilteredData());
  setTimeout(() => {
    node._isNew = false;
    Graph.graphData(getFilteredData());
  }, 2200);
  updateStats();
  showToast(
    node.conteudo.length > 70 ? node.conteudo.slice(0, 70) + '…' : node.conteudo,
    node.tipo.replace(/_/g, ' '),
    color
  );
}

// ─── Resize ───
window.addEventListener('resize', () => {
  Graph.width(window.innerWidth).height(window.innerHeight);
});

// ─── Keyboard ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state.selectedId) closePanel();
  if (e.key === '+' || e.key === '=') setZoom(0.85);
  if (e.key === '-' || e.key === '_') setZoom(1.18);
  if (e.key === '0') fitAll();
});

// Inicial: filtros recolhidos por padrão depois de 2.5s
setTimeout(() => {
  filtersEl.classList.add('is-collapsed');
  filtersToggle.setAttribute('aria-expanded', 'false');
}, 2500);
</script>
