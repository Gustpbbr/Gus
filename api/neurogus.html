<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050514">
<title>NeuroGus · memória viva</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap');

:root {
  --c-identidade:  #00f5ff;
  --c-decisao:     #c084fc;
  --c-episodico:   #fbbf24;
  --c-procedural:  #34d399;
  --c-meta:        #f9a8d4;
  --c-biografico:  #818cf8;
  --c-preferencia: #fb923c;
  --c-rotina:      #86efac;

  --bg-deep:    #050514;
  --panel:      rgba(8, 8, 28, 0.82);
  --panel-edge: rgba(255, 255, 255, 0.06);
  --glass:      rgba(255, 255, 255, 0.025);
  --hairline:   rgba(255, 255, 255, 0.08);

  --text:       rgba(255, 255, 255, 0.92);
  --text-soft:  rgba(255, 255, 255, 0.62);
  --text-mute:  rgba(255, 255, 255, 0.36);
  --text-faint: rgba(255, 255, 255, 0.18);

  --danger:     #f87171;

  --fs-eyebrow: 10px;
  --fs-micro:   11px;
  --fs-small:   12px;
  --fs-body:    14px;
  --fs-stat:    28px;
  --fs-display: 32px;

  --s-1: 4px;  --s-2: 8px;  --s-3: 12px;  --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px;  --s-10: 40px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--fs-body);
  line-height: 1.5;
  font-feature-settings: 'ss01', 'cv02', 'cv11';
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(0, 245, 255, 0.04), transparent 60%),
    radial-gradient(ellipse 70% 50% at 70% 80%, rgba(192, 132, 252, 0.035), transparent 60%);
  pointer-events: none; z-index: 1;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none; z-index: 1;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

#graph { position: fixed; inset: 0; z-index: 2; }

/* ─── Header ─── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: var(--s-6) var(--s-8);
  background: linear-gradient(to bottom, rgba(5,5,20,0.85) 0%, transparent 100%);
  pointer-events: none;
}

.brand { display: flex; flex-direction: column; gap: 2px; }
.brand__name {
  font-family: 'Instrument Serif', serif;
  font-size: var(--fs-display); font-weight: 400; font-style: italic;
  letter-spacing: -0.02em; line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--c-identidade) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.brand__sub {
  display: flex; align-items: center; gap: var(--s-2);
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute); margin-top: var(--s-1);
}
.brand__pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-identidade);
  box-shadow: 0 0 8px var(--c-identidade);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.85); }
  50%      { opacity: 1;   transform: scale(1.15); }
}

.stats { display: flex; gap: var(--s-8); pointer-events: auto; }
.stat { display: flex; flex-direction: column; align-items: flex-end; }
.stat__value {
  font-family: 'Instrument Serif', serif;
  font-size: var(--fs-stat); font-weight: 400; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat__value--accent { color: var(--c-identidade); }
.stat__label {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute); margin-top: var(--s-1);
}

/* ─── Filtros recolhíveis ─── */
.filters {
  position: fixed; top: 96px; left: var(--s-8); z-index: 50;
  display: flex; flex-direction: column; gap: 2px;
  pointer-events: auto;
}

.filters__header {
  display: flex; align-items: center; gap: var(--s-2);
  background: var(--panel);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 8px 10px 8px 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  color: var(--text-soft);
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  width: 160px;
}

.filters__header:hover { color: var(--text); border-color: rgba(255,255,255,0.16); }

.filters__chevron {
  margin-left: auto;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  width: 10px; height: 10px;
  display: flex; align-items: center; justify-content: center;
}
.filters__chevron svg { width: 100%; height: 100%; }
.filters.is-collapsed .filters__chevron { transform: rotate(-90deg); }

.filters__active-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #fff;
  transition: background 0.3s;
}

.filters__list {
  display: flex; flex-direction: column;
  gap: 2px;
  margin-top: 6px;
  max-height: 65vh;
  overflow-y: auto;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.3s ease,
              margin-top 0.3s ease;
  opacity: 1;
}

.filters.is-collapsed .filters__list {
  max-height: 0;
  opacity: 0;
  margin-top: 0;
}

.chip {
  appearance: none; background: transparent; border: 1px solid transparent;
  color: var(--text-mute); font-family: inherit;
  font-size: var(--fs-micro); letter-spacing: 0.06em;
  padding: 6px 12px 6px 8px; cursor: pointer;
  display: flex; align-items: center; gap: var(--s-2);
  border-radius: 999px;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  text-align: left;
}

.chip__dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  transition: box-shadow 0.25s ease;
}

.chip:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.chip:hover .chip__dot { box-shadow: 0 0 8px currentColor; }

.chip.is-active {
  color: var(--text);
  background: rgba(255,255,255,0.05);
  border-color: var(--hairline);
}
.chip.is-active .chip__dot { box-shadow: 0 0 10px currentColor; }

.chip--none {
  color: var(--text-faint);
  font-style: italic;
}
.chip--none .chip__dot {
  background: transparent;
  border: 1px dashed var(--text-faint);
  width: 6px; height: 6px;
}

/* ─── Controles 3D ─── */
.controls {
  position: fixed;
  bottom: var(--s-8);
  right: var(--s-8);
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  pointer-events: auto;
}

.ctrl-group {
  background: var(--panel);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ctrl-group--horizontal {
  flex-direction: row;
}

.ctrl-btn {
  appearance: none;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-soft);
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: inherit;
  position: relative;
}

.ctrl-btn:hover {
  color: var(--text);
  background: rgba(255,255,255,0.05);
}

.ctrl-btn:active {
  background: rgba(255,255,255,0.1);
  transform: scale(0.94);
}

.ctrl-btn.is-active {
  color: var(--c-identidade);
  background: rgba(0, 245, 255, 0.08);
}

.ctrl-btn svg {
  width: 16px; height: 16px;
  pointer-events: none;
}

.ctrl-btn__tooltip {
  position: absolute;
  right: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%) translateX(4px);
  background: var(--panel);
  backdrop-filter: blur(16px);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-soft);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
}

.ctrl-btn:hover .ctrl-btn__tooltip {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
}

.ctrl-btn--small {
  width: 32px;
  height: 26px;
}

.ctrl-divider {
  height: 1px;
  background: var(--hairline);
  margin: 4px 6px;
}

/* ─── Slider vertical de zoom ─── */
.ctrl-group--zoom {
  align-items: center;
  padding: 8px 6px;
  gap: 4px;
}

.zoom-slider {
  position: relative;
  width: 32px;
  height: 120px;
  margin: 4px 0;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.zoom-slider__track {
  position: absolute;
  width: 2px;
  height: 100%;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  pointer-events: none;
}

.zoom-slider__fill {
  position: absolute;
  width: 2px;
  bottom: 0;
  background: linear-gradient(to top, var(--c-identidade), rgba(0, 245, 255, 0.4));
  border-radius: 2px;
  height: 50%;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(0, 245, 255, 0.5);
  transition: height 0.15s ease;
}

.zoom-slider__thumb {
  position: absolute;
  width: 14px;
  height: 14px;
  background: var(--text);
  border: 2px solid var(--c-identidade);
  border-radius: 50%;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  box-shadow: 0 0 8px rgba(0, 245, 255, 0.6),
              0 2px 4px rgba(0, 0, 0, 0.3);
  transition: top 0.15s ease, transform 0.15s ease, box-shadow 0.2s ease;
}

.zoom-slider:hover .zoom-slider__thumb {
  transform: translateY(-50%) scale(1.15);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.8),
              0 2px 6px rgba(0, 0, 0, 0.4);
}

.zoom-slider.is-dragging .zoom-slider__thumb {
  transform: translateY(-50%) scale(1.25);
  transition: transform 0.1s ease;
}

.zoom-slider.is-dragging .zoom-slider__fill,
.zoom-slider.is-dragging .zoom-slider__thumb {
  transition: none;
}

/* ─── Indicadores de borda (radar) ─── */
.edge-indicators {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 25;
}

.edge-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
  opacity: 0;
  transition: opacity 0.3s, transform 0.15s ease-out;
  transform: translate(-50%, -50%);
}

.edge-dot.is-visible { opacity: 0.7; }

/* ─── Painel lateral ─── */
.panel {
  position: fixed; top: 0; right: 0;
  width: 380px; height: 100vh;
  background: var(--panel);
  backdrop-filter: blur(32px) saturate(140%);
  -webkit-backdrop-filter: blur(32px) saturate(140%);
  border-left: 1px solid var(--panel-edge);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel.is-open { transform: translateX(0); }
.panel__glow {
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  opacity: 0.6;
}
.panel__head {
  padding: var(--s-8) var(--s-6) var(--s-5);
  border-bottom: 1px solid var(--hairline);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: var(--s-4);
}
.panel__type {
  font-size: var(--fs-eyebrow); letter-spacing: 0.22em;
  text-transform: uppercase; margin-bottom: var(--s-2);
}
.panel__content {
  font-family: 'Instrument Serif', serif;
  font-size: 18px; line-height: 1.4;
  color: var(--text); word-break: break-word;
  letter-spacing: -0.005em;
}
.panel__close {
  appearance: none; background: transparent;
  border: 1px solid var(--hairline);
  color: var(--text-mute);
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; font-family: inherit;
}
.panel__close:hover { border-color: var(--c-meta); color: var(--c-meta); background: rgba(249,168,212,0.06); }
.panel__close svg { width: 12px; height: 12px; }
.panel__body {
  flex: 1; overflow-y: auto;
  padding: var(--s-5) var(--s-6) var(--s-6);
  display: flex; flex-direction: column; gap: var(--s-2);
}
.panel__body::-webkit-scrollbar { width: 3px; }
.panel__body::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 2px; }

.meta-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: var(--glass);
  border: 1px solid var(--hairline); border-radius: 8px;
  transition: border-color 0.2s;
}
.meta-row:hover { border-color: rgba(255,255,255,0.14); }
.meta-row__key {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-mute);
}
.meta-row__value {
  font-size: var(--fs-small); color: var(--text);
  text-align: right; max-width: 60%; word-break: break-word;
  font-variant-numeric: tabular-nums;
}

.confidence {
  display: flex; flex-direction: column; gap: var(--s-2);
  padding: var(--s-3) var(--s-4);
  background: var(--glass); border: 1px solid var(--hairline); border-radius: 8px;
}
.confidence__row { display: flex; justify-content: space-between; align-items: center; }
.confidence__bar {
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.confidence__fill {
  height: 100%; border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 8px currentColor;
}

.section-title {
  font-size: var(--fs-eyebrow); letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-mute);
  margin: var(--s-5) 0 var(--s-3);
  padding-left: var(--s-2);
  display: flex; align-items: center; gap: var(--s-2);
}
.section-title__count { color: var(--text-faint); font-variant-numeric: tabular-nums; }

.connection {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 14px; background: var(--glass);
  border: 1px solid var(--hairline); border-radius: 8px;
  cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
}
.connection:hover { border-color: rgba(255,255,255,0.18); transform: translateX(2px); }
.connection__type {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase;
}
.connection__preview {
  font-size: var(--fs-small); color: var(--text-soft); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.panel__delete {
  margin: 0 var(--s-6) var(--s-6);
  padding: 12px;
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px; color: var(--danger);
  font-family: inherit; font-size: var(--fs-micro);
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: var(--s-2);
}
.panel__delete:hover { background: rgba(248,113,113,0.12); border-color: var(--danger); }

/* ─── Labels ─── */
.label-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 30; }

.node-label {
  position: absolute;
  transform: translate(-50%, -120%);
  pointer-events: none; opacity: 0;
  transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1),
              transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.node-label.is-visible  { opacity: 1; transform: translate(-50%, -132%); }
.node-label.is-selected { opacity: 1; transform: translate(-50%, -138%); }

.label-card {
  position: relative;
  background: rgba(8,8,28,0.88);
  border: 1px solid var(--hairline); border-radius: 10px;
  padding: 9px 13px; max-width: 220px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.label-card::after {
  content: ''; position: absolute;
  bottom: -16px; left: 50%; transform: translateX(-50%);
  width: 1px; height: 16px;
  background: linear-gradient(to bottom, currentColor, transparent);
  opacity: 0.4;
}
.label-card__type {
  font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; margin-bottom: 4px; line-height: 1;
}
.label-card__text {
  font-family: 'Instrument Serif', serif;
  font-size: 13px; color: var(--text); line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: var(--s-8); right: 110px;
  z-index: 200; max-width: 280px;
  background: var(--panel); border: 1px solid var(--hairline);
  border-radius: 12px; padding: var(--s-3) var(--s-4);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  opacity: 0; transform: translateY(16px);
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  display: flex; gap: var(--s-3); align-items: flex-start;
}
.toast.is-shown { opacity: 1; transform: translateY(0); }
.toast__indicator {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 5px; flex-shrink: 0;
  box-shadow: 0 0 10px currentColor;
}
.toast__body { flex: 1; min-width: 0; }
.toast__label {
  font-size: var(--fs-eyebrow); letter-spacing: 0.18em;
  text-transform: uppercase; margin-bottom: 3px;
}
.toast__text { font-size: var(--fs-small); color: var(--text); line-height: 1.4; word-break: break-word; }

/* ─── Hint ─── */
.hint {
  position: fixed; bottom: var(--s-8); left: 50%;
  transform: translateX(-50%);
  font-size: var(--fs-eyebrow); letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-faint);
  pointer-events: none; transition: opacity 0.5s; z-index: 40;
}

/* ─── Abas de navegação ─── */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(8, 8, 28, 0.6);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  padding: 4px;
  pointer-events: auto;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.tab {
  appearance: none;
  background: transparent;
  border: none;
  color: var(--text-mute);
  font-family: inherit;
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.tab svg {
  width: 14px;
  height: 14px;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.tab:hover {
  color: var(--text-soft);
}
.tab:hover svg { opacity: 1; }

.tab.is-active {
  color: var(--text);
  background: rgba(255, 255, 255, 0.06);
}
.tab.is-active svg {
  opacity: 1;
  color: var(--c-identidade);
}

/* ─── View Lista ─── */
.list-view {
  position: fixed;
  inset: 0;
  z-index: 3;
  background: var(--bg-deep);
  display: none;
  flex-direction: column;
  padding-top: 110px;
}

.list-view.is-active {
  display: flex;
}

.list-view::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 30% 30%, rgba(0, 245, 255, 0.025), transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(192, 132, 252, 0.02), transparent 70%);
  pointer-events: none;
  z-index: -1;
}

.list-view__header {
  padding: 0 var(--s-8) var(--s-5);
  flex-shrink: 0;
}

.list-view__title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-bottom: 6px;
}

.list-view__sub {
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
}

.list-view__body {
  flex: 1;
  overflow-y: auto;
  padding: var(--s-4) var(--s-8) var(--s-10);
}

.list-view__body::-webkit-scrollbar { width: 4px; }
.list-view__body::-webkit-scrollbar-track { background: transparent; }
.list-view__body::-webkit-scrollbar-thumb {
  background: var(--hairline);
  border-radius: 2px;
}

.area-group {
  margin-bottom: var(--s-8);
}

.area-group__head {
  display: flex;
  align-items: baseline;
  gap: var(--s-3);
  padding-bottom: var(--s-3);
  margin-bottom: var(--s-3);
  border-bottom: 1px solid var(--hairline);
}

.area-group__name {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  font-style: italic;
  color: var(--text);
  text-transform: lowercase;
  letter-spacing: -0.005em;
}

.area-group__count {
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}

.area-group__items {
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}

.list-item {
  display: flex;
  align-items: flex-start;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  background: var(--glass);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.list-item:hover {
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.04);
  transform: translateX(2px);
}

.list-item__dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}

.list-item__body {
  flex: 1;
  min-width: 0;
}

.list-item__top {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin-bottom: 4px;
  flex-wrap: wrap;
}

.list-item__type {
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.list-item__meta {
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.12em;
  color: var(--text-faint);
  text-transform: uppercase;
}

.list-item__content {
  font-family: 'Instrument Serif', serif;
  font-size: 15px;
  line-height: 1.45;
  color: var(--text-soft);
  letter-spacing: -0.005em;
}

.list-item__conf {
  font-size: var(--fs-eyebrow);
  letter-spacing: 0.12em;
  color: var(--text-mute);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

.list-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
  font-size: var(--fs-small);
  letter-spacing: 0.1em;
}

/* Quando lista está ativa, esconder elementos da view cosmos */
body.view-list #graph,
body.view-list .filters,
body.view-list .controls,
body.view-list .label-canvas,
body.view-list .edge-indicators,
body.view-list .hint {
  display: none;
}

/* ─── Responsivo ─── */
@media (max-width: 768px) {
  .header { padding: var(--s-4) var(--s-5); }
  .brand__name { font-size: 26px; }
  .stats { gap: var(--s-5); }
  .stat__value { font-size: 22px; }
  .filters { top: 88px; left: var(--s-5); }
  .filters__header { width: 140px; }
  .panel { width: 100vw; }
  .controls { bottom: var(--s-4); right: var(--s-4); }
  .zoom-slider { height: 90px; }
  .toast { bottom: 110px; right: var(--s-5); left: var(--s-5); max-width: none; }

  .tab { padding: 8px 10px; }
  .tab span { display: none; }
  .tab svg { width: 16px; height: 16px; }

  .list-view { padding-top: 90px; }
  .list-view__header { padding: 0 var(--s-5) var(--s-4); }
  .list-view__title { font-size: 22px; }
  .list-view__body { padding: var(--s-3) var(--s-5) var(--s-10); }
  .area-group { margin-bottom: var(--s-6); }
  .area-group__name { font-size: 17px; }
}

@media (max-width: 480px) {
  .stats { display: none; }
}
</style>
</head>
<body>
<header class="header">
  <div class="brand">
    <span class="brand__name">NeuroGus</span>
    <span class="brand__sub">
      <span class="brand__pulse"></span>
      memória viva
    </span>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab is-active" data-view="cosmos" id="tab-cosmos">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="8" cy="8" r="5.5"/>
        <ellipse cx="8" cy="8" rx="5.5" ry="2"/>
      </svg>
      <span>cosmos</span>
    </button>
    <button class="tab" data-view="list" id="tab-list">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M3 4 H13 M3 8 H13 M3 12 H13"/>
        <circle cx="3" cy="4" r="0.8" fill="currentColor"/>
        <circle cx="3" cy="8" r="0.8" fill="currentColor"/>
        <circle cx="3" cy="12" r="0.8" fill="currentColor"/>
      </svg>
      <span>lista</span>
    </button>
  </nav>

  <div class="stats">
    <div class="stat">
      <span class="stat__value" id="stat-frags">0</span>
      <span class="stat__label">fragmentos</span>
    </div>
    <div class="stat">
      <span class="stat__value" id="stat-conns">0</span>
      <span class="stat__label">conexões</span>
    </div>
    <div class="stat">
      <span class="stat__value stat__value--accent" id="stat-today">0</span>
      <span class="stat__label">hoje</span>
    </div>
  </div>
</header>

<nav class="filters" id="filters">
  <button class="filters__header" id="filters-toggle" aria-expanded="true">
    <span class="filters__active-dot" id="filters-dot" style="background:#fff"></span>
    <span id="filters-label">todos</span>
    <span class="filters__chevron">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4 L5 7 L8 4"/>
      </svg>
    </span>
  </button>
  <div class="filters__list" id="filters-list">
    <button class="chip is-active" data-filter="all">
      <span class="chip__dot" style="background:#fff"></span>
      <span>todos</span>
    </button>
    <button class="chip chip--none" data-filter="none">
      <span class="chip__dot"></span>
      <span>sem labels</span>
    </button>
    <button class="chip" data-filter="identidade_operacional" style="color:var(--c-identidade)">
      <span class="chip__dot" style="background:var(--c-identidade)"></span>
      <span>identidade</span>
    </button>
    <button class="chip" data-filter="decisao" style="color:var(--c-decisao)">
      <span class="chip__dot" style="background:var(--c-decisao)"></span>
      <span>decisão</span>
    </button>
    <button class="chip" data-filter="episodico" style="color:var(--c-episodico)">
      <span class="chip__dot" style="background:var(--c-episodico)"></span>
      <span>episódico</span>
    </button>
    <button class="chip" data-filter="procedural" style="color:var(--c-procedural)">
      <span class="chip__dot" style="background:var(--c-procedural)"></span>
      <span>procedural</span>
    </button>
    <button class="chip" data-filter="meta_reflexao" style="color:var(--c-meta)">
      <span class="chip__dot" style="background:var(--c-meta)"></span>
      <span>meta-reflexão</span>
    </button>
    <button class="chip" data-filter="biografico" style="color:var(--c-biografico)">
      <span class="chip__dot" style="background:var(--c-biografico)"></span>
      <span>biográfico</span>
    </button>
    <button class="chip" data-filter="preferencia" style="color:var(--c-preferencia)">
      <span class="chip__dot" style="background:var(--c-preferencia)"></span>
      <span>preferência</span>
    </button>
    <button class="chip" data-filter="rotina" style="color:var(--c-rotina)">
      <span class="chip__dot" style="background:var(--c-rotina)"></span>
      <span>rotina</span>
    </button>

    <button class="chip" data-filter="emocional" style="color:#fb7185">
      <span class="chip__dot" style="background:#fb7185"></span>
      <span>emocional</span>
    </button>
    <button class="chip" data-filter="fato" style="color:#94a3b8">
      <span class="chip__dot" style="background:#94a3b8"></span>
      <span>fato</span>
    </button>
    <button class="chip" data-filter="cronologico" style="color:#a78bfa">
      <span class="chip__dot" style="background:#a78bfa"></span>
      <span>cronológico</span>
    </button>
    <button class="chip" data-filter="conexao_emergente" style="color:#fcd34d">
      <span class="chip__dot" style="background:#fcd34d"></span>
      <span>conexão</span>
    </button>
    <button class="chip" data-filter="projeto" style="color:#22d3ee">
      <span class="chip__dot" style="background:#22d3ee"></span>
      <span>projeto</span>
    </button>
    <button class="chip" data-filter="lacuna" style="color:#fda4af">
      <span class="chip__dot" style="background:#fda4af"></span>
      <span>lacuna</span>
    </button>

    <div style="height:1px;background:var(--hairline);margin:6px 4px"></div>

    <button class="chip chip--toggle is-active" id="halo-toggle" data-filter="__halo">
      <span class="chip__dot" style="background:var(--text-soft);box-shadow:0 0 6px var(--text-soft)"></span>
      <span>halo</span>
    </button>
  </div>
</nav>

<div class="edge-indicators" id="edge-indicators"></div>
<div class="label-canvas" id="label-canvas"></div>
<div id="graph"></div>

<!-- View: Lista por área -->
<div class="list-view" id="list-view">
  <div class="list-view__header">
    <h2 class="list-view__title">fragmentos por área</h2>
    <div class="list-view__sub">toque num fragmento pra ver detalhes</div>
  </div>
  <div class="list-view__body" id="list-view-body"></div>
</div>

<!-- Controles 3D -->
<div class="controls">
  <div class="ctrl-group ctrl-group--zoom">
    <button class="ctrl-btn ctrl-btn--small" id="zoom-in" aria-label="Aproximar">
      <span class="ctrl-btn__tooltip">aproximar</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 8 H12 M8 4 V12"/>
      </svg>
    </button>
    <div class="zoom-slider" id="zoom-slider">
      <div class="zoom-slider__track"></div>
      <div class="zoom-slider__fill" id="zoom-slider-fill"></div>
      <div class="zoom-slider__thumb" id="zoom-slider-thumb"></div>
    </div>
    <button class="ctrl-btn ctrl-btn--small" id="zoom-out" aria-label="Afastar">
      <span class="ctrl-btn__tooltip">afastar</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 8 H12"/>
      </svg>
    </button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn ctrl-btn--small" id="zoom-fit" aria-label="Enquadrar tudo">
      <span class="ctrl-btn__tooltip">enquadrar tudo</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 5 V2 H5 M11 2 H14 V5 M14 11 V14 H11 M5 14 H2 V11"/>
        <circle cx="8" cy="8" r="2.5"/>
      </svg>
    </button>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn" id="rotate-left" aria-label="Rotacionar esquerda">
      <span class="ctrl-btn__tooltip">girar ←</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 8 A5 5 0 1 1 8 13"/>
        <path d="M3 5 V8 H6"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="rotate-right" aria-label="Rotacionar direita">
      <span class="ctrl-btn__tooltip">girar →</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 8 A5 5 0 1 0 8 13"/>
        <path d="M13 5 V8 H10"/>
      </svg>
    </button>
    <button class="ctrl-btn is-active" id="auto-rotate" aria-label="Auto-rotação">
      <span class="ctrl-btn__tooltip">auto-rotação</span>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <ellipse cx="8" cy="8" rx="6" ry="2.5"/>
        <ellipse cx="8" cy="8" rx="2.5" ry="6"/>
      </svg>
    </button>
  </div>
</div>

<aside class="panel" id="panel">
  <div class="panel__glow" id="panel-glow"></div>
  <div class="panel__head">
    <div style="flex:1;min-width:0">
      <div class="panel__type" id="panel-type"></div>
      <div class="panel__content" id="panel-content">—</div>
    </div>
    <button class="panel__close" id="panel-close" aria-label="Fechar">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 2 L10 10 M10 2 L2 10"/>
      </svg>
    </button>
  </div>
  <div class="panel__body" id="panel-body"></div>
  <button class="panel__delete" id="panel-delete">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M2 3h8 M4 3v-1.5h4V3 M3 3l0.6 7.5h4.8L9 3"/>
    </svg>
    apagar fragmento
  </button>
</aside>

<div class="toast" id="toast">
  <div class="toast__indicator" id="toast-dot"></div>
  <div class="toast__body">
    <div class="toast__label" id="toast-label"></div>
    <div class="toast__text" id="toast-text"></div>
  </div>
</div>

<div class="hint" id="hint">arraste pra girar · scroll pra zoom</div>
<script>
/*__SCRIPT_PLACEHOLDER__*/
</script>
</body>
</html>
