name: Ingest Mem0 from Claude Chat

on:
  schedule:
    - cron: '*/30 * * * *'   # a cada 30min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Hub Curador (ADR-001 Fase 2.5): qdrant-client + sentence-transformers + anthropic
        # mem0ai foi REMOVIDO — Hub Qdrant direto substitui o caminho antigo
        run: pip install -r requirements.txt

      - name: Ingest Claude Chat → Hub Qdrant (Curador híbrido)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python .github/scripts/ingest_mem0_from_chat.py
