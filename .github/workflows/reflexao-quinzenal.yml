name: Reflexão quinzenal (SELF-1)

on:
  schedule:
    - cron: '0 13 * * 6'   # sábado 10h BRT (13h UTC)
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forçar execução mesmo em semana ímpar"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  reflexao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mem0ai==0.1.29 anthropic==0.40.0 httpx==0.27.0

      - name: Rodar Nosis + Thymos + Síntese
        env:
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: python .github/scripts/reflexao_quinzenal.py

      - name: Commit and push
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add projetos/gus/reflexoes/
          git diff --staged --quiet || git commit -m "auto: reflexão quinzenal ($(date +%Y-W%V))"
          git push
