name: Export Mem0 SaaS legacy (uso único)

# Dispatch manual apenas. Verifica se o Mem0 SaaS antigo (api.mem0.ai) ainda
# tem conteúdo e exporta pra historico/. Após rodar e Gustavo confirmar
# decisão, apaga MEM0_API_KEY do Railway + GitHub Secrets, e este workflow
# pode ser deletado junto com .github/scripts/export_mem0_saas_legacy.py.
#
# Contexto: Fase 0 plano saneamento memória (02/05/2026).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mem0ai (inline — não está em requirements pós-R2)
        run: pip install mem0ai==0.1.29

      - name: Export Mem0 SaaS
        env:
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
        run: python .github/scripts/export_mem0_saas_legacy.py

      - name: Commit e push se houve export
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add historico/mem0-saas-export-final-*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "diag(memoria): export final Mem0 SaaS legacy"
          git push || echo "Nada novo a pushar."
