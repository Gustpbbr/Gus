name: Migrar Mem0 Cloud → Qdrant (rodar uma vez)

on:
  workflow_dispatch:  # só manual — nunca automático

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mem0ai==0.1.29 qdrant-client sentence-transformers anthropic

      - name: Rodar migração
        env:
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/migrate_mem0.py
