name: Delete Drive file (admin)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'ID do arquivo no Drive (opcional se file_path for passado)'
        required: false
        type: string
      file_path:
        description: 'Path relativo a Gus-Sync/, ex: dialogos/Demandas Gustavo/teste.md'
        required: false
        type: string
      mode:
        description: 'Modo de operação'
        required: true
        type: choice
        default: 'trash'
        options:
          - dry-run
          - trash
          - delete

permissions:
  contents: read
  id-token: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Run delete script
        env:
          FILE_ID: ${{ inputs.file_id }}
          FILE_PATH: ${{ inputs.file_path }}
          MODE: ${{ inputs.mode }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python .github/scripts/delete_drive_file.py
