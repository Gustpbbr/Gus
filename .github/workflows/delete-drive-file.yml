name: Delete Drive file (admin)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'ID do arquivo no Google Drive'
        required: true
        type: string
      mode:
        description: 'Modo de operação'
        required: true
        type: choice
        default: 'trash'
        options:
          - dry-run
          - trash
          - delete

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Run delete script
        env:
          FILE_ID: ${{ inputs.file_id }}
          MODE: ${{ inputs.mode }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python .github/scripts/delete_drive_file.py
