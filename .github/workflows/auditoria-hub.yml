name: Auditoria Mem0 diária

on:
  schedule:
    - cron: '0 9 * * *'   # 6h BRT, depois do export Mem0 das 3h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Migrado em R2 (2026-04-27): lê do Hub Qdrant, não mais Mem0 SaaS.
        run: pip install -r .github/scripts/requirements.txt

      - name: Rodar auditoria do Hub Qdrant
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python .github/scripts/auditoria_hub.py

      - name: Commit and push if changed
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add _indices/_auditoria-hub.md
          git diff --staged --quiet || git commit -m "auto: auditoria Mem0 ($(date +%Y-%m-%d))"
          git push
