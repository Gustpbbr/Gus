name: Retrospectiva semanal

on:
  schedule:
    - cron: '0 23 * * 5'   # sexta 20h BRT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrospectiva:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo pra git log funcionar

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Migrado em R2 (2026-04-27): lê do Hub Qdrant, não mais Mem0 SaaS.
        run: pip install -r .github/scripts/requirements.txt

      - name: Gerar retrospectiva
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/retrospectiva_semanal.py

      - name: Commit and push
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add pessoal/diario/
          git diff --staged --quiet || git commit -m "auto: retrospectiva semanal ($(date +%Y-W%V))"
          git push
