name: Export Mem0 diário

on:
  schedule:
    - cron: '0 6 * * *'  # 3h de Brasília (6h UTC)
  workflow_dispatch:       # permite rodar manualmente

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mem0ai

      - name: Export Mem0 memories
        env:
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
        run: python .github/scripts/export_mem0.py

      - name: Commit and push if changed
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add gus-memoria-export.md
          git diff --staged --quiet || git commit -m "auto: export diário Mem0 ($(date +%Y-%m-%d))"
          git push
