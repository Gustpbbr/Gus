name: Export Mem0 diário

# DESATIVADO 2026-05-07 — Mem0 SaaS aposentado (ADR-001). Hub Qdrant é a
# fonte da verdade. Manter como workflow_dispatch para auditoria histórica.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Migrado em R2 (2026-04-27): lê do Hub Qdrant, não mais Mem0 SaaS.
        run: pip install -r .github/scripts/requirements.txt

      - name: Export Hub memories
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python .github/scripts/export_mem0.py

      - name: Commit and push if changed
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add gus-memoria-export.md gus-memoria-export.json
          git diff --staged --quiet || git commit -m "auto: export diário Hub ($(date +%Y-%m-%d))"
          git push
