name: Gerar estado atual pro Claude Chat

# Cron a cada 1h (era 15min — reduzido para evitar redeploys Railway e consumo
# excessivo de GitHub Actions minutes). Claude Chat lê o arquivo no boot de
# sessão, não em tempo real — 1h de lag é aceitável.
# [railway skip] nos commits evita redeploy mesmo se Railway monitorar main.

on:
  schedule:
    - cron: '0 * * * *'   # todo hora cheia (era */15)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Gerar gus-estado-atual.md
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python .github/scripts/gerar_estado_atual_chat.py

      - name: Commit and push if changed
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          git add dialogos/_bootstrap/gus-estado-atual.md
          # [railway skip] evita redeploy Railway a cada commit automático
          git diff --staged --quiet || git commit -m "auto: estado atual do Hub pra Claude Chat ($(date -u +%Y-%m-%dT%H:%MZ)) [railway skip]"
          git push
