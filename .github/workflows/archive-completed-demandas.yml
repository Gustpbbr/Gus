name: Archive completed demandas

on:
  schedule:
    - cron: '*/15 * * * *'   # a cada 15min
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib pyyaml

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Archive completed demandas
        env:
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python .github/scripts/archive_completed.py

      - name: Commit and push if changed
        run: |
          git config user.name "gus-bot"
          git config user.email "gus-bot@users.noreply.github.com"
          if git diff --staged --quiet; then
            echo "Nada a commitar"
            exit 0
          fi
          git commit -m "auto: archive demandas concluidas ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
